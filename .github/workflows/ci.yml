name: CI

on:
  push:
    branches: [main, atharva]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npm test

  frontend:
    name: frontend (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Lint
        # The pre-existing baseline is 5 errors + 8 warnings (shadcn ui +
        # historical Index.tsx/RoomView.tsx). Allow the lint to surface
        # them without failing CI; new lint failures introduced by a PR
        # show up in the diff annotations.
        continue-on-error: true
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    name: docker images build
    runs-on: ubuntu-latest
    # Only validate the Dockerfiles build on main / PRs to main; keeps the
    # branch-push path fast.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: socket-webrtc-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: socket-webrtc-frontend:ci
          build-args: |
            VITE_SIGNAL_URL=http://localhost:3000
