# Docker Compose for the Socket-WebRTC platform.
#
# Quick start:
#   1. cp .env.example .env
#   2. openssl rand -hex 32   # paste into TURN_SECRET (and AUTH_JWT_SECRET) in .env
#   3. docker compose up -d
#   4. App: http://localhost:8080  ·  Backend: http://localhost:3000
#      Prometheus: http://localhost:9090  ·  Grafana: http://localhost:3001 (admin/admin)
#
# Production deployment notes are inline below.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socket-webrtc-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:?AUTH_JWT_SECRET not set}
      - TURN_SECRET=${TURN_SECRET:-}
      - TURN_HOST=${TURN_HOST:-}
      - TURN_PORT=${TURN_PORT:-3478}
      - TURN_TLS=${TURN_TLS:-false}
      - SFU_MESH_MAX=${SFU_MESH_MAX:-4}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - MAGIC_LINK_BASE=${MAGIC_LINK_BASE:-http://localhost:8080}
      - METRICS_INTERVAL_MS=${METRICS_INTERVAL_MS:-5000}
    ports:
      - "3000:3000"
      # mediasoup RTP — must match transport.ts port range.
      - "40000-40100:40000-40100/udp"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SIGNAL_URL: ${VITE_SIGNAL_URL:-http://localhost:3000}
    container_name: socket-webrtc-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  coturn:
    image: coturn/coturn:4.6
    container_name: socket-webrtc-coturn
    restart: unless-stopped
    # On a Linux production host, prefer host networking — UDP relay through
    # docker-proxy is slow and flakey. To switch:
    #   - uncomment `network_mode: host`
    #   - delete the entire `ports:` block below
    # network_mode: host
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command:
      - "-c"
      - "/etc/coturn/turnserver.conf"
      - "--static-auth-secret=${TURN_SECRET:?TURN_SECRET not set in .env}"
      - "--realm=${TURN_REALM:-socket-webrtc.local}"
      - "--external-ip=${EXTERNAL_IP:-127.0.0.1}"

  prometheus:
    image: prom/prometheus:latest
    container_name: socket-webrtc-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      # Allow the prometheus-in-container to reach the host's port 3000.
      # Linux Docker doesn't auto-resolve host.docker.internal; this fixes
      # it. Mac/Windows already do.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: socket-webrtc-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana-provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana-dashboard.json:/var/lib/grafana/dashboards/socket-webrtc.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  grafana-data:
