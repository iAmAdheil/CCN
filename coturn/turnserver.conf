# coturn configuration for Socket-WebRTC
#
# Authentication: TURN REST API time-limited credentials.
# - Secret is passed at runtime via --static-auth-secret in docker-compose.yml.
# - Backend mints credentials with HMAC-SHA1(secret, "<expiry>:<userId>").
# - Coturn validates by recomputing the same HMAC.

listening-port=3478
tls-listening-port=5349

# Long-term credential mechanism (required by use-auth-secret).
lt-cred-mech
use-auth-secret

# Issue fingerprints in TURN messages (interop with WebRTC).
fingerprint

# Relay UDP port range. Must match the range exposed in docker-compose.yml,
# otherwise media will silently fail. Kept narrow on purpose so port mapping
# stays manageable on Windows/macOS Docker Desktop.
min-port=49160
max-port=49200

# Disable things we don't use / harden.
no-cli
no-multicast-peers
no-tlsv1
no-tlsv1_1
no-loopback-peers

# Don't relay to private addresses (prevents pivoting through the TURN server).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Logging — log to stdout so `docker logs` shows everything.
log-file=stdout
simple-log
verbose
