server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets — long cache, immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any non-asset path serves index.html so React Router
  # picks it up (and so /?magic=<jwt> redemption works).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Disable server token to avoid leaking version.
  server_tokens off;
}
